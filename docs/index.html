<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>جاري التنزيل...</title>
    <script>
        fetch('latest.json')
            .then(function (response) { return response.json(); })
            .then(function (data) {
                var url = 'https://github.com/sibhialnajjar/employee_apk/releases/download/latest/'
                    + encodeURIComponent(data.file);
                window.location.replace(url);
            })
            .catch(function () {
                document.getElementById('status').textContent = 'تعذر بدء التنزيل. حاول لاحقاً.';
            });
    </script>
</head>
<body>
    <p id="status">جاري التنزيل...</p>
</body>
</html>
